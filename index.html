<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Joe's Personal Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px calc(80px + env(safe-area-inset-bottom));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 900px;
  margin: 0 auto;
}

.dash-title {
  margin: 0 0 22px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento Grid ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}

/* Tile base */
.tile {
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 18px 20px 16px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.07);
  background: linear-gradient(160deg, rgba(255,255,255,0.065) 0%, rgba(255,255,255,0.028) 100%);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1),
              border-color 0.18s ease,
              box-shadow 0.18s ease;
}
.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(ellipse at 30% 0%, rgba(var(--accent-rgb), 0.08), transparent 60%);
  pointer-events: none;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: rgba(var(--accent-rgb), 0.35);
  box-shadow: 0 14px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08),
              0 0 0 1px rgba(var(--accent-rgb), 0.12);
}
.tile:active { transform: translateY(-1px); }

/* Size variants */
.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

/* Tile internals */
.tile-num {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
  line-height: 1;
  flex-shrink: 0;
}

.tile-emoji {
  position: absolute;
  top: 16px;
  right: 18px;
  font-size: 28px;
  filter: drop-shadow(0 0 10px rgba(var(--accent-rgb), 0.55));
  line-height: 1;
  pointer-events: none;
}
.tile.big .tile-emoji { font-size: 40px; top: 20px; right: 22px; }

.tile-spacer { flex: 1; }

.tile-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--text-primary);
  line-height: 1.15;
  margin-bottom: 6px;
}
.tile.big .tile-title { font-size: 22px; margin-bottom: 8px; }

.tile-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.tile-sub {
  font-size: 12px;
  color: var(--text-tertiary);
  line-height: 1.3;
  flex: 1;
}
.tile.big .tile-sub { font-size: 13px; }

.tile-arrow {
  font-size: 16px;
  font-weight: 600;
  color: rgb(var(--accent-rgb));
  transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
  flex-shrink: 0;
}
.tile:hover .tile-arrow { transform: translateX(4px); }

/* Accent colours — store as r,g,b for rgba() use */
.tile[data-accent="#6BE3A4"] { --accent-rgb: 107,227,164; }
.tile[data-accent="#7DD3FC"] { --accent-rgb: 125,211,252; }
.tile[data-accent="#A7F3D0"] { --accent-rgb: 167,243,208; }
.tile[data-accent="#60A5FA"] { --accent-rgb: 96,165,250;  }
.tile[data-accent="#F2C063"] { --accent-rgb: 242,192,99;  }

/* ===== Responsive ===== */
@media (max-width: 720px) {
  .bento {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 148px;
  }
  .tile.big { grid-row: span 1; }
}
@media (max-width: 440px) {
  .bento {
    grid-template-columns: 1fr;
    grid-auto-rows: 140px;
  }
  .tile.big, .tile.wide { grid-column: span 1; grid-row: span 1; }
  .tile-emoji { font-size: 24px; }
  .tile.big .tile-emoji { font-size: 28px; }
}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Dashboard</h1>

  <div class="bento">

    <!-- ·01 Main — big -->
    <a class="tile big" href="main.html" data-accent="#6BE3A4">
      <span class="tile-num">·01</span>
      <span class="tile-emoji">🏠</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·02 Fitness — wide -->
    <a class="tile wide" href="gym.html" data-accent="#7DD3FC">
      <span class="tile-num">·02</span>
      <span class="tile-emoji">💪</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·03 Health — small -->
    <a class="tile" href="health.html" data-accent="#A7F3D0">
      <span class="tile-num">·03</span>
      <span class="tile-emoji">💊</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·04 Water — small -->
    <a class="tile" href="po-water.html" data-accent="#60A5FA">
      <span class="tile-num">·04</span>
      <span class="tile-emoji">💧</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·05 Finance — wide -->
    <a class="tile wide" href="finance.html" data-accent="#F2C063">
      <span class="tile-num">·05</span>
      <span class="tile-emoji">📊</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>
</body>
</html>
