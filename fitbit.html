<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Health · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg:#050506; --bg-card:rgba(255,255,255,0.04); --bg2:rgba(255,255,255,0.035);
  --border:rgba(255,255,255,0.06); --border-strong:rgba(255,255,255,0.12);
  --tp:#FAFAFA; --ts:#B8B6B0; --tt:#76746E;
  --font:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --green:#6BE3A4; --yellow:#F2C063; --red:#FF8A8A; --blue:#1A73E8;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ts);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
body{min-height:100vh;position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(60% 50% at 82% 14%,rgba(26,115,232,.14) 0%,transparent 60%),radial-gradient(50% 40% at 18% 90%,rgba(180,180,200,.06) 0%,transparent 60%);filter:blur(40px);pointer-events:none;z-index:0;animation:drift 36s ease-in-out infinite alternate;}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.014) 1px,transparent 1px);background-size:3px 3px;pointer-events:none;z-index:1;}
@keyframes drift{0%{transform:translate(0,0);}100%{transform:translate(-2%,2%);}}
main{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:56px 20px 80px;}

.section-title{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--tt);margin:0 4px 14px;display:flex;align-items:center;gap:12px;}
.section-title::before{content:'≡';font-size:14px;opacity:.5;}
.fb-section{margin-bottom:36px;}

.dash-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:12px;}
.dash-title{font-size:28px;font-weight:700;letter-spacing:-.025em;background:linear-gradient(135deg,#FFF 0%,#888 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:transparent;line-height:1.15;margin:0;}
.refresh-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border-strong);background:rgba(255,255,255,.04);color:var(--ts);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .2s;flex-shrink:0;font-family:inherit;padding:0;}
.refresh-btn:hover{background:rgba(255,255,255,.10);color:var(--tp);}
.refresh-btn.spinning{animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.last-updated{font-family:var(--mono);font-size:11px;color:var(--tt);margin-bottom:28px;margin-left:4px;}

/* not connected */
.nc-card{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:22px;box-shadow:0 12px 40px rgba(0,0,0,.45);margin-bottom:20px;}
.nc-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 20px;gap:10px;}
.nc-mark{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#1A73E8,#4285F4);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(26,115,232,.35);margin-bottom:6px;}
.nc-title{font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--tp);}
.nc-sub{font-size:13px;color:var(--tt);max-width:300px;line-height:1.6;margin-bottom:6px;}
.nc-link{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:999px;border:1px solid rgba(26,115,232,.5);background:linear-gradient(180deg,rgba(26,115,232,.2) 0%,rgba(26,115,232,.1) 100%);color:#4285F4;font:inherit;font-size:14px;font-weight:700;text-decoration:none;transition:transform .12s,box-shadow .18s;box-shadow:0 0 22px rgba(26,115,232,.18);margin-top:4px;}
.nc-link:hover{transform:translateY(-1px);box-shadow:0 0 32px rgba(26,115,232,.3);}

/* glance grid */
.glance-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.glance-grid{grid-template-columns:1fr;}}
.glance-card{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:20px;padding:20px;position:relative;overflow:hidden;animation:fadeUp .4s ease both;}
.glance-card.wide{grid-column:1/-1;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.glance-card:nth-child(1){animation-delay:.05s;}.glance-card:nth-child(2){animation-delay:.10s;}.glance-card:nth-child(3){animation-delay:.15s;}.glance-card:nth-child(4){animation-delay:.20s;}.glance-card:nth-child(5){animation-delay:.25s;}.glance-card:nth-child(6){animation-delay:.30s;}
.glance-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tt);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.sdot-g{background:var(--green);box-shadow:0 0 6px rgba(107,227,164,.6);}
.sdot-y{background:var(--yellow);box-shadow:0 0 6px rgba(242,192,99,.6);}
.sdot-r{background:var(--red);box-shadow:0 0 6px rgba(255,138,138,.6);}

/* steps ring */
.steps-inner{display:flex;align-items:center;gap:16px;}
.ring-wrap{position:relative;flex-shrink:0;width:84px;height:84px;}
.ring-svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:239;stroke-dashoffset:239;transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1),stroke .4s;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-size:17px;font-weight:700;color:var(--tp);line-height:1;}
.ring-pct-sub{font-size:8px;color:var(--tt);font-weight:600;letter-spacing:.08em;margin-top:2px;}
.steps-info{flex:1;}
.big-num{font-size:36px;font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--tp);font-variant-numeric:tabular-nums;}
.big-unit{font-size:13px;color:var(--tt);margin-left:3px;}
.goal-line{font-size:11px;color:var(--tt);margin-top:6px;font-family:var(--mono);}

/* sleep card */
.sleep-big{display:flex;align-items:baseline;gap:4px;margin-bottom:10px;}
.sleep-h{font-size:46px;font-weight:700;letter-spacing:-.04em;line-height:1;}
.sleep-unit{font-size:13px;color:var(--tt);}
.mini-bar{display:flex;height:8px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.04);margin-bottom:8px;}
.mb-rem{background:#1A73E8;height:100%;transition:width .8s cubic-bezier(.22,1,.36,1);}
.mb-deep{background:#7DD3FC;height:100%;transition:width .8s cubic-bezier(.22,1,.36,1);}
.mb-light{background:#76746E;height:100%;transition:width .8s cubic-bezier(.22,1,.36,1);}
.mb-awake{background:#38362F;border-right:1px solid rgba(255,255,255,.08);height:100%;transition:width .8s cubic-bezier(.22,1,.36,1);}
.stage-row{display:flex;gap:10px;flex-wrap:wrap;}
.stage-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--ts);}
.sdot2{width:6px;height:6px;border-radius:2px;flex-shrink:0;}
.stage-val{font-weight:700;color:var(--tp);font-size:10px;}

/* HR card */
.hr-main{display:flex;align-items:baseline;gap:6px;margin-bottom:14px;}
.hr-range{display:flex;gap:6px;}
.hr-range-item{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:8px 10px;text-align:center;}
.hr-range-val{font-size:18px;font-weight:700;color:var(--tp);line-height:1;}
.hr-range-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--tt);margin-top:3px;font-weight:700;}

/* progress bar cards */
.prog-num{font-size:36px;font-weight:700;letter-spacing:-.04em;color:var(--tp);line-height:1;margin-bottom:6px;}
.prog-sub{font-size:11px;color:var(--tt);margin-bottom:12px;font-family:var(--mono);}
.prog-track{height:6px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;}
.prog-fill{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.22,1,.36,1);}

/* small metric */
.small-val{font-size:40px;font-weight:700;letter-spacing:-.04em;line-height:1;}
.small-unit{font-size:14px;color:var(--tt);}
.small-sub{font-size:11px;color:var(--tt);margin-top:8px;font-family:var(--mono);}

/* 7-day trends */
.trend-card{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:20px;padding:20px 20px 14px;margin-bottom:12px;animation:fadeUp .4s ease both;}
.trend-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px;}
.trend-title{font-size:13px;font-weight:700;color:var(--tp);}
.trend-compare{text-align:right;font-family:var(--mono);font-size:10.5px;color:var(--tt);line-height:1.6;}
.tc-up{color:var(--green);font-weight:700;}
.tc-down{color:var(--red);font-weight:700;}
.tc-same{color:var(--tt);font-weight:700;}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:80px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative;}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:3px;position:relative;transition:opacity .2s;}
.bar-col:hover .bar{opacity:.8;}
.bar-tooltip{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:8.5px;font-weight:700;white-space:nowrap;opacity:0;color:var(--ts);pointer-events:none;transition:opacity .2s;background:rgba(5,5,6,.9);padding:2px 5px;border-radius:4px;}
.bar-col:hover .bar-tooltip{opacity:1;}
.bar-day{font-size:9px;color:var(--tt);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.trend-goal-line{font-size:10.5px;color:var(--tt);font-family:var(--mono);margin-top:6px;}

/* insights */
.insight-card{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border-radius:16px;margin-bottom:10px;border:1px solid;font-size:13px;line-height:1.6;animation:fadeUp .4s ease both;}
.insight-card.red{background:rgba(255,138,138,.06);border-color:rgba(255,138,138,.2);}
.insight-card.yellow{background:rgba(242,192,99,.06);border-color:rgba(242,192,99,.2);}
.insight-card.green{background:rgba(107,227,164,.06);border-color:rgba(107,227,164,.2);}
.insight-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.insight-body{flex:1;}
.insight-tag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;margin-bottom:5px;}
.insight-card.red .insight-tag{color:var(--red);}
.insight-card.yellow .insight-tag{color:var(--yellow);}
.insight-card.green .insight-tag{color:var(--green);}
.insight-text{color:var(--ts);}
.insight-text strong{color:var(--tp);font-weight:600;}

::selection{background:rgba(26,115,232,.25);color:var(--tp);}
::-webkit-scrollbar{width:10px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:999px;}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15);}
</style>
</head>
<body>
<main>

  <div class="dash-title-row">
    <h1 class="dash-title">Health</h1>
    <button class="refresh-btn" id="refreshBtn" title="Refresh data" type="button">⟳</button>
  </div>
  <div id="lastUpdated" class="last-updated" style="display:none"></div>

  <div id="notConnected" class="nc-card">
    <div class="nc-wrap">
      <div class="nc-mark">❤️</div>
      <div class="nc-title">Not connected</div>
      <div class="nc-sub">Connect your Google account in Settings to see your fitness data — steps, sleep, heart rate, and more.</div>
      <a href="settings.html" class="nc-link">Open Settings →</a>
    </div>
  </div>

  <section class="fb-section" id="glanceSection" style="display:none">
    <div class="section-title">Today at a Glance</div>
    <div class="glance-grid" id="glanceGrid"></div>
  </section>

  <section class="fb-section" id="trendsSection" style="display:none">
    <div class="section-title">7-Day Trends</div>
    <div id="trendsContainer"></div>
  </section>

  <section class="fb-section" id="insightsSection" style="display:none">
    <div class="section-title">Insights &amp; Where to Improve</div>
    <div id="insightsList"></div>
  </section>

</main>
<script>
(function () {
  'use strict';

  const TOKEN_KEY     = 'google_access_token';
  const REFRESH_KEY   = 'google_refresh_token';
  const TOKEN_EXP_KEY = 'google_token_exp';
  const SYNC_KEY      = 'gh_last_sync';
  const HEALTH_BASE   = '/api/health-proxy';

  function getToken() {
    const exp = parseInt(localStorage.getItem(TOKEN_EXP_KEY) || '0', 10);
    if (exp && Date.now() > exp) return null;
    return localStorage.getItem(TOKEN_KEY);
  }

  async function refreshAccessToken() {
    const rt = localStorage.getItem(REFRESH_KEY);
    if (!rt) return null;
    try {
      const r = await fetch('/api/google-refresh', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: rt }),
      });
      const d = await r.json();
      if (!d.access_token) return null;
      localStorage.setItem(TOKEN_KEY, d.access_token);
      localStorage.setItem(TOKEN_EXP_KEY, String(Date.now() + (d.expires_in || 3600) * 1000));
      return d.access_token;
    } catch { return null; }
  }

  async function gFetch(url, opts = {}) {
    let tok = getToken();
    if (!tok) { tok = await refreshAccessToken(); if (!tok) throw new Error('not_authed'); }
    const doFetch = t => {
      const fo = { method: opts.method || 'GET', headers: { Authorization: 'Bearer ' + t, Accept: 'application/json' } };
      if (opts.body) { fo.headers['Content-Type'] = 'application/json'; fo.body = JSON.stringify(opts.body); }
      return fetch(url, fo);
    };
    let r = await doFetch(tok);
    if (r.status === 401) {
      tok = await refreshAccessToken();
      if (!tok) throw new Error('token_expired');
      r = await doFetch(tok);
    }
    if (!r.ok) throw new Error('api_' + r.status);
    return r.json();
  }

  function show(id) { const el = document.getElementById(id); if (el) el.style.display = ''; }
  function hide(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
  function pct(a, b) { return b ? Math.min(100, Math.round(a / b * 100)) : 0; }
  function fmtMin(m) {
    if (!m) return '0m';
    const h = Math.floor(m / 60), mm = m % 60;
    if (!h) return mm + 'm';
    if (!mm) return h + 'h';
    return h + 'h ' + mm + 'm';
  }
  function avg(arr) { return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0; }

  // ── Google Health API v4 helpers ────────────────────────────
  async function fetchDaily(dataType, filterField, startISO, endISO) {
    const filter = filterField + ' >= "' + startISO + '" AND ' + filterField + ' < "' + endISO + '"';
    const path   = '/users/me/dataTypes/' + dataType + '/dataPoints';
    const url    = HEALTH_BASE + '?path=' + encodeURIComponent(path) + '&filter=' + encodeURIComponent(filter) + '&pageSize=1000';
    console.log('[FITBIT] Fetching:', url);
    const resp = await gFetch(url);
    console.log('[FITBIT] ' + dataType + ':', JSON.stringify(resp).slice(0, 400));
    return resp.dataPoints || resp.data_points || [];
  }

  async function fetchSamples(dataType, filterField, startISO, endISO) {
    const filter = filterField + ' >= "' + startISO + '" AND ' + filterField + ' < "' + endISO + '"';
    const path   = '/users/me/dataTypes/' + dataType + '/dataPoints';
    const url    = HEALTH_BASE + '?path=' + encodeURIComponent(path) + '&filter=' + encodeURIComponent(filter) + '&pageSize=1000';
    console.log('[FITBIT] Fetching:', url);
    const resp = await gFetch(url);
    console.log('[FITBIT] ' + dataType + ':', JSON.stringify(resp).slice(0, 400));
    return resp.dataPoints || resp.data_points || [];
  }

  // ── Glance card HTML builders ────────────────────────────────

  function stepsCard(steps) {
    const GOAL = 10000;
    const p = pct(steps, GOAL);
    const circ = 239; // 2π × 38
    const offset = circ * (1 - p / 100);
    const col = steps >= GOAL ? '#6BE3A4' : steps >= 5000 ? '#F2C063' : '#FF8A8A';
    const dc  = steps >= GOAL ? 'sdot-g'  : steps >= 5000 ? 'sdot-y' : 'sdot-r';
    const disp = steps >= 1000 ? (steps/1000).toFixed(1) + 'k' : String(steps);
    const msg  = steps >= GOAL ? '✓ Goal reached' : ((GOAL - steps).toLocaleString() + ' to go');
    return `<div class="glance-card">
      <div class="glance-label">Steps <span class="sdot ${dc}"></span></div>
      <div class="steps-inner">
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 84 84">
            <circle class="ring-track" cx="42" cy="42" r="38"/>
            <circle class="ring-fill" cx="42" cy="42" r="38" style="stroke:${col};stroke-dashoffset:${offset.toFixed(1)}"/>
          </svg>
          <div class="ring-center"><div class="ring-pct">${p}%</div><div class="ring-pct-sub">of goal</div></div>
        </div>
        <div class="steps-info">
          <div class="big-num">${disp}</div>
          <div class="goal-line">goal: 10,000</div>
          <div class="goal-line" style="color:${col};margin-top:4px">${msg}</div>
        </div>
      </div>
    </div>`;
  }

  function sleepCard(sleepMins, eff, rem, deep, light, awake) {
    const hrs = (sleepMins / 60).toFixed(1);
    const col = sleepMins >= 420 ? '#6BE3A4' : sleepMins >= 360 ? '#F2C063' : '#FF8A8A';
    const dc  = sleepMins >= 420 ? 'sdot-g'  : sleepMins >= 360 ? 'sdot-y' : 'sdot-r';
    const tot = (rem + deep + light + awake) || sleepMins || 1;
    const effStr = eff != null ? eff + '%' : '—';
    return `<div class="glance-card">
      <div class="glance-label">Sleep <span class="sdot ${dc}"></span></div>
      <div class="sleep-big">
        <span class="sleep-h" style="color:${col}">${hrs}</span>
        <span class="sleep-unit">hrs &nbsp;·&nbsp; ${effStr} eff.</span>
      </div>
      <div class="mini-bar">
        <div class="mb-rem"   style="width:${pct(rem,tot)}%"></div>
        <div class="mb-deep"  style="width:${pct(deep,tot)}%"></div>
        <div class="mb-light" style="width:${pct(light,tot)}%"></div>
        <div class="mb-awake" style="width:${pct(awake,tot)}%"></div>
      </div>
      <div class="stage-row">
        <div class="stage-item"><span class="sdot2" style="background:#1A73E8"></span>REM <span class="stage-val">${fmtMin(rem)}</span></div>
        <div class="stage-item"><span class="sdot2" style="background:#7DD3FC"></span>Deep <span class="stage-val">${fmtMin(deep)}</span></div>
        <div class="stage-item"><span class="sdot2" style="background:#76746E"></span>Light <span class="stage-val">${fmtMin(light)}</span></div>
        <div class="stage-item"><span class="sdot2" style="background:#38362F;border:1px solid rgba(255,255,255,.2)"></span>Awake <span class="stage-val">${fmtMin(awake)}</span></div>
      </div>
    </div>`;
  }

  function hrCard(rhr, hrMin, hrMax) {
    const col = rhr < 55 ? '#6BE3A4' : rhr < 65 ? '#B8B6B0' : rhr < 75 ? '#F2C063' : '#FF8A8A';
    const dc  = rhr < 65 ? 'sdot-g'  : rhr < 75 ? 'sdot-y' : 'sdot-r';
    const rangeHtml = (hrMin != null && hrMax != null) ? `
      <div class="hr-range">
        <div class="hr-range-item"><div class="hr-range-val">${hrMin}</div><div class="hr-range-lbl">Min today</div></div>
        <div class="hr-range-item"><div class="hr-range-val">${hrMax}</div><div class="hr-range-lbl">Max today</div></div>
      </div>` : '';
    return `<div class="glance-card">
      <div class="glance-label">Heart Rate <span class="sdot ${dc}"></span></div>
      <div class="hr-main">
        <span class="big-num" style="color:${col}">${rhr}</span>
        <span class="big-unit">bpm resting</span>
      </div>
      ${rangeHtml}
    </div>`;
  }

  function progCard(label, value, dispVal, sub, goalVal, color) {
    const p = pct(value, goalVal);
    const dc = p >= 100 ? 'sdot-g' : p >= 60 ? 'sdot-y' : 'sdot-r';
    return `<div class="glance-card">
      <div class="glance-label">${label} <span class="sdot ${dc}"></span></div>
      <div class="prog-num">${dispVal}</div>
      <div class="prog-sub">${sub}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${p}%;background:${color}"></div></div>
    </div>`;
  }

  function spo2Card(spo2) {
    const col = spo2 >= 95 ? '#6BE3A4' : spo2 >= 90 ? '#F2C063' : '#FF8A8A';
    const dc  = spo2 >= 95 ? 'sdot-g'  : spo2 >= 90 ? 'sdot-y' : 'sdot-r';
    return `<div class="glance-card">
      <div class="glance-label">Blood Oxygen <span class="sdot ${dc}"></span></div>
      <div style="padding:6px 0">
        <span class="small-val" style="color:${col}">${spo2.toFixed(1)}</span><span class="small-unit">%</span>
        <div class="small-sub">${spo2 >= 95 ? 'Normal range' : 'Below normal — monitor'}</div>
      </div>
    </div>`;
  }

  function renderGlance(today) {
    const grid = document.getElementById('glanceGrid');
    if (!grid) return;
    let html = '';
    if (today.steps    != null) html += stepsCard(today.steps);
    if (today.sleepMins != null) html += sleepCard(today.sleepMins, today.sleepEff, today.rem||0, today.deep||0, today.light||0, today.awake||0);
    if (today.rhr      != null) html += hrCard(today.rhr, today.hrMin, today.hrMax);
    if (today.calories  > 0)   html += progCard('Calories', today.calories, today.calories.toLocaleString(), 'goal: 2,500 cal', 2500, '#6BE3A4');
    if (today.azm       > 0)   html += progCard('Active Minutes', today.azm, today.azm + ' min', 'goal: 22 min', 22, '#1A73E8');
    if (today.distanceM > 0)   html += progCard('Distance', today.distanceM, (today.distanceM/1000).toFixed(2) + ' km', 'goal: 8 km', 8000, '#F2C063');
    if (today.spo2     != null) html += spo2Card(today.spo2);
    grid.innerHTML = html;
    if (html) show('glanceSection');
  }

  // ── Bar chart builder ────────────────────────────────────────
  const DAY_NAMES = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  function barChart(days, priorDays, key, label, goalVal, fmtFn) {
    const vals = days.map(d => d[key] || 0);
    if (vals.every(v => v === 0)) return '';
    const maxVal = Math.max(...vals) || 1;
    const thisAvg  = avg(vals.filter(v => v > 0));
    const priorAvg = priorDays ? avg(priorDays.map(d => d[key] || 0).filter(v => v > 0)) : null;

    const bestIdx  = vals.indexOf(Math.max(...vals));
    const nonZero  = vals.filter(v => v > 0);
    const worstVal = nonZero.length > 1 ? Math.min(...nonZero) : -1;
    const worstIdx = worstVal > -1 ? vals.lastIndexOf(worstVal) : -1;

    const bars = days.map((d, i) => {
      const v = d[key] || 0;
      const h = Math.max(3, Math.round((v / maxVal) * 72));
      const isBest  = i === bestIdx && v > 0;
      const isWorst = i === worstIdx && v > 0 && worstIdx !== bestIdx;
      const col = isBest ? '#1A73E8' : isWorst ? '#FF6B6B' : 'rgba(255,255,255,.15)';
      const lbl = new Date(d.dateMs);
      return `<div class="bar-col">
        <div class="bar" style="height:${h}px;background:${col}">
          <div class="bar-tooltip">${fmtFn ? fmtFn(v) : v >= 1000 ? (v/1000).toFixed(1)+'k' : v}</div>
        </div>
        <div class="bar-day">${DAY_NAMES[lbl.getDay()]}</div>
      </div>`;
    }).join('');

    let compareHtml = '';
    if (priorAvg != null && priorAvg > 0) {
      const diff = thisAvg - priorAvg;
      const sign = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
      const cls  = diff > 0 ? 'tc-up' : diff < 0 ? 'tc-down' : 'tc-same';
      const absFmt = fmtFn ? fmtFn(Math.abs(diff)) : Math.abs(diff) >= 1000 ? (Math.abs(diff)/1000).toFixed(1)+'k' : String(Math.abs(diff));
      compareHtml = `This week avg: <strong style="color:var(--tp)">${fmtFn ? fmtFn(thisAvg) : thisAvg >= 1000 ? (thisAvg/1000).toFixed(1)+'k' : thisAvg}</strong><br>vs last week: <span class="${cls}">${sign} ${absFmt}</span>`;
    } else {
      compareHtml = `7-day avg: <strong style="color:var(--tp)">${fmtFn ? fmtFn(thisAvg) : thisAvg >= 1000 ? (thisAvg/1000).toFixed(1)+'k' : thisAvg}</strong>`;
    }

    const goalLine = goalVal != null ? `<div class="trend-goal-line">goal: ${fmtFn ? fmtFn(goalVal) : goalVal.toLocaleString()}</div>` : '';

    return `<div class="trend-card">
      <div class="trend-header">
        <div class="trend-title">${label}</div>
        <div class="trend-compare">${compareHtml}</div>
      </div>
      <div class="bar-chart">${bars}</div>
      ${goalLine}
    </div>`;
  }

  function renderTrends(days7, prior7, sleepMap) {
    const container = document.getElementById('trendsContainer');
    if (!container) return;

    const withSleep = arr => arr.map(d => ({ ...d, sleepMins: sleepMap[d.dateMs] || 0 }));

    let html = '';
    html += barChart(days7, prior7, 'steps', 'Steps', 10000, v => v >= 1000 ? (v/1000).toFixed(1)+'k' : String(v));
    html += barChart(withSleep(days7), withSleep(prior7), 'sleepMins', 'Sleep', 420, fmtMin);
    html += barChart(days7, prior7, 'azm', 'Active Minutes', 22, null);
    html += barChart(days7, prior7, 'calories', 'Calories Burned', 2500, v => v.toLocaleString());
    if (days7.some(d => d.distanceM > 0))
      html += barChart(days7, prior7, 'distanceM', 'Distance', 8000, v => (v/1000).toFixed(1)+'km');

    container.innerHTML = html;
    if (html) show('trendsSection');
  }

  // ── Insights ─────────────────────────────────────────────────
  function renderInsights(today, days7, sleepMap) {
    const container = document.getElementById('insightsList');
    if (!container) return;
    const ins = [];

    const stepVals  = days7.map(d => d.steps || 0).filter(v => v > 0);
    const sleepVals = days7.map(d => sleepMap[d.dateMs] || 0).filter(v => v > 0);
    const azmVals   = days7.map(d => d.azm || 0);

    // Steps hit rate
    if (stepVals.length >= 3) {
      const hits = stepVals.filter(v => v >= 10000).length;
      const rate = hits / stepVals.length;
      const best = days7.reduce((b, d) => (d.steps||0) > (b.steps||0) ? d : b, days7[0]);
      const bestDay = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date(best.dateMs).getDay()];
      if (rate === 1)
        ins.push({ lvl:'green', icon:'🏆', tag:'Steps', text:`You hit your 10k step goal <strong>every day this week</strong>. Excellent consistency.` });
      else if (rate >= 0.6)
        ins.push({ lvl:'yellow', icon:'🚶', tag:'Steps', text:`Step goal reached <strong>${hits} of ${stepVals.length} days</strong>. Best day: <strong>${bestDay}</strong>. A short evening walk on slower days would close the gap.` });
      else
        ins.push({ lvl:'red', icon:'🚶', tag:'Steps', text:`Step goal hit only <strong>${hits} of ${stepVals.length} days</strong>. Best day was <strong>${bestDay}</strong> — try a 20-minute walk each morning to build the habit.` });
    }

    // Sleep average
    if (sleepVals.length >= 3) {
      const avgSleep = avg(sleepVals);
      const avgH = (avgSleep / 60).toFixed(1);
      if (avgSleep >= 420)
        ins.push({ lvl:'green', icon:'😴', tag:'Sleep Duration', text:`Averaging <strong>${avgH} hours</strong> — above the 7-hour target. Consistent sleep drives recovery, mood, and cognitive performance.` });
      else if (avgSleep >= 360)
        ins.push({ lvl:'yellow', icon:'😴', tag:'Sleep Duration', text:`Averaging <strong>${avgH} hours</strong>. You're close — going to bed 30 minutes earlier a few nights a week would push you past the 7-hour mark.` });
      else
        ins.push({ lvl:'red', icon:'😴', tag:'Sleep Duration', text:`Only <strong>${avgH} hours</strong> average sleep this week. Chronic under-sleeping raises resting heart rate, impairs muscle recovery, and affects focus. Prioritize an earlier bedtime.` });
    }

    // Deep sleep
    if (today.deep != null && today.deep > 0) {
      if (today.deep >= 90)
        ins.push({ lvl:'green', icon:'🌊', tag:'Deep Sleep', text:`Great deep sleep last night: <strong>${fmtMin(today.deep)}</strong>. Deep sleep is where physical repair happens — keep the same sleep schedule.` });
      else if (today.deep >= 55)
        ins.push({ lvl:'yellow', icon:'🌊', tag:'Deep Sleep', text:`Deep sleep last night: <strong>${fmtMin(today.deep)}</strong>. The 90-minute target maximizes recovery — try reducing alcohol and avoiding intense workouts within 3 hours of bed.` });
      else
        ins.push({ lvl:'red', icon:'🌊', tag:'Deep Sleep', text:`Deep sleep was only <strong>${fmtMin(today.deep)}</strong> last night. Common causes: alcohol, late caffeine, irregular sleep times, or a warm room. Aim for 18–20°C and a consistent bedtime.` });
    }

    // Active minutes
    if (azmVals.filter(v => v > 0).length >= 3) {
      const hits   = azmVals.filter(v => v >= 22).length;
      const avgAzm = avg(azmVals.filter(v => v > 0));
      if (hits >= 5)
        ins.push({ lvl:'green', icon:'💪', tag:'Activity', text:`Active minutes goal hit <strong>${hits} of 7 days</strong>, averaging <strong>${avgAzm} min/day</strong>. Consistent Zone 2 cardio is one of the strongest longevity signals.` });
      else
        ins.push({ lvl:'yellow', icon:'💪', tag:'Activity', text:`Active minutes goal reached <strong>${hits} of 7 days</strong> (avg <strong>${avgAzm} min</strong>). Two brisk 10-minute walks easily clears the 22-minute daily target.` });
    }

    // RHR
    if (today.rhr != null) {
      if (today.rhr < 55)
        ins.push({ lvl:'green', icon:'❤️', tag:'Resting Heart Rate', text:`RHR of <strong>${today.rhr} bpm</strong> is excellent — a strong indicator of cardiovascular fitness.` });
      else if (today.rhr < 65)
        ins.push({ lvl:'green', icon:'❤️', tag:'Resting Heart Rate', text:`RHR of <strong>${today.rhr} bpm</strong> is in the healthy range. Regular aerobic exercise will trend this lower over time.` });
      else if (today.rhr < 75)
        ins.push({ lvl:'yellow', icon:'❤️', tag:'Resting Heart Rate', text:`RHR is <strong>${today.rhr} bpm</strong>. Values above 65 often signal accumulated fatigue or mild dehydration. Rest, hydrate, and check if sleep quality has dipped recently.` });
      else
        ins.push({ lvl:'red', icon:'❤️', tag:'Resting Heart Rate', text:`Elevated RHR at <strong>${today.rhr} bpm</strong>. This commonly follows poor sleep, dehydration, illness onset, or overtraining. Take a recovery day and prioritize fluids.` });
    }

    // SpO2
    if (today.spo2 != null && today.spo2 < 95)
      ins.push({ lvl:'red', icon:'🫁', tag:'Blood Oxygen', text:`SpO₂ of <strong>${today.spo2.toFixed(1)}%</strong> is below the 95% normal threshold. Avoid strenuous exercise and ensure your bedroom is well ventilated.` });

    container.innerHTML = ins.map((item, i) => `
      <div class="insight-card ${item.lvl}" style="animation-delay:${i * 0.07}s">
        <div class="insight-icon">${item.icon}</div>
        <div class="insight-body">
          <div class="insight-tag">${item.tag}</div>
          <div class="insight-text">${item.text}</div>
        </div>
      </div>`).join('');
    if (ins.length) show('insightsSection');
  }

  // ── Load data from Google Health API v4 ─────────────────────
  async function loadData() {
    const btn = document.getElementById('refreshBtn');
    if (btn) btn.classList.add('spinning');

    const now      = new Date();
    const today    = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const d14      = new Date(today.getTime() - 13 * 86400000);
    const tomorrow = new Date(today.getTime() + 86400000);

    const startISO    = d14.toISOString().slice(0, 10)      + 'T00:00:00Z';
    const todayISO    = today.toISOString().slice(0, 10)    + 'T00:00:00Z';
    const tomorrowISO = tomorrow.toISOString().slice(0, 10) + 'T00:00:00Z';
    const endISO      = now.toISOString();

    try {
      const [stepsR, rhrR, sleepR, activeR, hrR] = await Promise.allSettled([
        fetchDaily  ('steps',                    'steps.interval.start_time',                startISO,  endISO),
        fetchDaily  ('daily-resting-heart-rate', 'daily_resting_heart_rate.start_time',      startISO,  endISO),
        fetchDaily  ('sleep',                    'sleep.interval.start_time',                startISO,  endISO),
        fetchDaily  ('active-minutes',           'active_minutes.interval.start_time',       startISO,  endISO),
        fetchSamples('heart-rate',               'heart_rate.sample_time.physical_time',     todayISO,  tomorrowISO),
      ]);

      if (stepsR.status  === 'rejected') console.warn('[FITBIT] steps failed:',   stepsR.reason);
      if (rhrR.status    === 'rejected') console.warn('[FITBIT] rhr failed:',     rhrR.reason);
      if (sleepR.status  === 'rejected') console.warn('[FITBIT] sleep failed:',   sleepR.reason);
      if (activeR.status === 'rejected') console.warn('[FITBIT] active failed:',  activeR.reason);
      if (hrR.status     === 'rejected') console.warn('[FITBIT] hr failed:',      hrR.reason);

      const stepsPoints  = stepsR.status  === 'fulfilled' ? stepsR.value  : [];
      const rhrPoints    = rhrR.status    === 'fulfilled' ? rhrR.value    : [];
      const sleepPoints  = sleepR.status  === 'fulfilled' ? sleepR.value  : [];
      const activePoints = activeR.status === 'fulfilled' ? activeR.value : [];
      const hrPoints     = hrR.status     === 'fulfilled' ? hrR.value     : [];

      // Build a per-day map keyed by YYYY-MM-DD
      const dayMap = {};
      const day0 = dk => {
        if (!dayMap[dk]) dayMap[dk] = { dateKey: dk, steps: 0, calories: 0, azm: 0, distanceM: 0, sleepMins: 0, rhr: null };
        return dayMap[dk];
      };
      const ptKey = p => (p.interval?.startTime || p.sampleTime?.physicalTime || p.startTime || p.day || '').slice(0, 10);

      for (const p of stepsPoints) {
        const k = ptKey(p); if (!k) continue;
        day0(k).steps += p.steps ?? p.count ?? p.value ?? 0;
      }
      for (const p of rhrPoints) {
        const k = ptKey(p); if (!k) continue;
        const bpm = p.dailyRestingHeartRate?.beatsPerMinute ?? p.heartRate?.beatsPerMinute ?? p.bpm ?? p.value ?? null;
        if (bpm != null) day0(k).rhr = Math.round(bpm);
      }
      for (const p of sleepPoints) {
        const k = ptKey(p); if (!k) continue;
        const st = p.interval?.startTime || p.startTime;
        const et = p.interval?.endTime   || p.endTime;
        if (st && et) day0(k).sleepMins += Math.round((new Date(et) - new Date(st)) / 60000);
      }
      for (const p of activePoints) {
        const k = ptKey(p); if (!k) continue;
        day0(k).azm += p.activeMinutes?.value ?? p.value ?? p.minutes ?? 0;
      }

      // Today's HR min/max from raw samples
      let hrMin = null, hrMax = null;
      const hrBpms = hrPoints.map(p => p.heartRate?.beatsPerMinute ?? p.bpm ?? p.value ?? 0).filter(v => v > 30 && v < 220);
      if (hrBpms.length) { hrMin = Math.round(Math.min(...hrBpms)); hrMax = Math.round(Math.max(...hrBpms)); }

      // Sort by date; convert dateKey → local dateMs for the render functions
      const sorted = Object.values(dayMap).sort((a, b) => a.dateKey < b.dateKey ? -1 : 1);
      const toDayMs = dk => { const p = dk.split('-').map(Number); return new Date(p[0], p[1]-1, p[2]).getTime(); };
      const daysAll = sorted.map(d => ({ ...d, dateMs: toDayMs(d.dateKey) }));

      const last14  = daysAll.slice(-14);
      const prior7  = last14.slice(0, 7);
      const days7   = last14.slice(-7);
      const todayBk = days7[days7.length - 1] || {};

      const sleepMap = {};
      for (const d of daysAll) { if (d.sleepMins) sleepMap[d.dateMs] = d.sleepMins; }

      const todayData = {
        steps:     todayBk.steps    || null,
        calories:  todayBk.calories || 0,
        azm:       todayBk.azm      || 0,
        distanceM: 0,
        sleepMins: todayBk.sleepMins || null,
        sleepEff:  null,
        rem: 0, deep: 0, light: 0, awake: 0,
        rhr:   todayBk.rhr || null,
        hrMin, hrMax,
        spo2:  null,
      };

      renderGlance(todayData);
      renderTrends(days7, prior7, sleepMap);
      renderInsights(todayData, days7, sleepMap);

      const ts = Date.now();
      localStorage.setItem(SYNC_KEY, String(ts));
      const el = document.getElementById('lastUpdated');
      if (el) { el.textContent = 'Last synced at ' + new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); el.style.display = ''; }

    } catch (e) {
      console.error('[FITBIT] loadData error:', e);
      if (['not_authed', 'token_expired', 'api_403'].includes(e.message)) {
        ['glanceSection','trendsSection','insightsSection'].forEach(id => hide(id));
        show('notConnected');
      }
    } finally {
      const b = document.getElementById('refreshBtn');
      if (b) b.classList.remove('spinning');
    }
  }

  // ── Init ─────────────────────────────────────────────────────
  async function init() {
    let tok = getToken();
    if (!tok) tok = await refreshAccessToken();
    if (!tok) return;

    hide('notConnected');

    const lastSync = parseInt(localStorage.getItem(SYNC_KEY) || '0', 10);
    if (lastSync) {
      const minAgo = Math.round((Date.now() - lastSync) / 60000);
      const el = document.getElementById('lastUpdated');
      if (el) { el.textContent = 'Last synced ' + minAgo + ' min ago'; el.style.display = ''; }
    }

    loadData();

    const rb = document.getElementById('refreshBtn');
    if (rb) rb.addEventListener('click', async () => {
      let t = getToken();
      if (!t) t = await refreshAccessToken();
      if (!t) { show('notConnected'); return; }
      loadData();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => init(), { once: true });
  } else {
    init();
  }
})();
</script>
</body>
</html>
