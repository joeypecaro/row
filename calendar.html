<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Calendar · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506; --bg-card: rgba(255,255,255,0.04); --bg-secondary: rgba(255,255,255,0.035);
  --bg-input: rgba(0,0,0,0.28); --bg-input-focus: rgba(0,0,0,0.36);
  --border: rgba(255,255,255,0.06); --border-soft: rgba(255,255,255,0.04);
  --border-strong: rgba(255,255,255,0.12);
  --text-primary: #FAFAFA; --text-secondary: #B8B6B0;
  --text-tertiary: #76746E; --text-quaternary: #4D4B47;
  --accent: #1A73E8; --accent-glow: rgba(26,115,232,0.35);
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-secondary);
  font-family: var(--font); font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 75% 12%, rgba(26,115,232,0.13) 0%, transparent 60%),
    radial-gradient(50% 40% at 18% 90%, rgba(180,180,200,0.06) 0%, transparent 60%);
  filter: blur(40px); pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(-2%,2%); } }

main { position: relative; z-index: 2; max-width: 720px; margin: 0 auto;
  padding: 56px 20px 80px; padding-top: max(56px, env(safe-area-inset-top, 56px)); }

/* ── Page title ── */
.dash-title-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; gap: 12px;
}
.dash-title {
  font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(135deg, #FFFFFF 0%, #888888 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; color: transparent; line-height: 1.15; margin: 0;
}
.refresh-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border-strong);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, transform 0.2s; flex-shrink: 0;
  font-family: inherit; padding: 0;
}
.refresh-btn:hover { background: rgba(255,255,255,0.10); color: var(--text-primary); }
.refresh-btn.spinning { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.last-updated { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-bottom: 24px; margin-left: 4px; }

/* ── Section title ── */
.section-title {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); margin: 0 4px 14px;
  display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '≡'; font-size: 14px; opacity: 0.5; }

/* ── Card ── */
.cal-card {
  padding: 22px;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  margin-bottom: 20px;
}

/* ── Not connected ── */
.not-connected-wrap {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding: 40px 20px; gap: 10px;
}
.nc-brand-mark {
  width: 52px; height: 52px; border-radius: 16px;
  background: linear-gradient(135deg, #1A73E8, #4285F4);
  color: #fff; font-weight: 900; font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 24px rgba(26,115,232,0.35); margin-bottom: 6px;
}
.nc-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); }
.nc-sub { font-size: 13px; color: var(--text-tertiary); max-width: 300px; line-height: 1.6; margin-bottom: 6px; }
.nc-link {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; border-radius: 999px;
  border: 1px solid rgba(26,115,232,0.50);
  background: linear-gradient(180deg, rgba(26,115,232,0.20) 0%, rgba(26,115,232,0.10) 100%);
  color: #4285F4; font: inherit; font-size: 14px; font-weight: 700;
  text-decoration: none; cursor: pointer;
  transition: transform 0.12s, box-shadow 0.18s;
  box-shadow: 0 0 22px rgba(26,115,232,0.18); margin-top: 4px;
}
.nc-link:hover { transform: translateY(-1px); box-shadow: 0 0 32px rgba(26,115,232,0.30); }

/* ── Add event toggle ── */
.section-title-row {
  display: flex; align-items: center; justify-content: space-between;
  margin: 0 4px 14px;
}
.section-title-row .section-title { margin: 0; }
.cal-add-toggle {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 999px;
  background: rgba(26,115,232,0.12);
  border: 1px solid rgba(26,115,232,0.30);
  color: #4285F4; font: inherit; font-size: 12px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.04em;
  transition: background 0.15s, box-shadow 0.15s;
}
.cal-add-toggle:hover { background: rgba(26,115,232,0.20); box-shadow: 0 0 14px rgba(26,115,232,0.20); }
.cal-add-toggle.active { background: rgba(26,115,232,0.22); }

/* ── Add event form ── */
.cal-form-card {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(26,115,232,0.20);
  border-radius: 18px;
  padding: 18px 20px 16px;
  margin-bottom: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.cal-form-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 12px;
}
@media (max-width: 480px) { .cal-form-grid { grid-template-columns: 1fr; } }
.cal-form-title-row { margin-bottom: 12px; }
.form-label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 6px;
}
.form-input {
  width: 100%; background: var(--bg-input);
  border: 1px solid var(--border-strong);
  border-radius: 10px; color: var(--text-primary);
  font: inherit; padding: 10px 14px; font-size: 14px;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus { outline: none; border-color: rgba(26,115,232,0.5); background: var(--bg-input-focus); }
.form-input::placeholder { color: var(--text-quaternary); }
select.form-input { cursor: pointer; }
.cal-form-actions {
  display: flex; gap: 8px; justify-content: flex-end;
}
.btn-ghost {
  padding: 9px 18px; border-radius: 10px;
  border: 1px solid var(--border-strong);
  background: transparent; color: var(--text-secondary);
  font: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, color 0.15s;
}
.btn-ghost:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
.btn-primary {
  padding: 9px 20px; border-radius: 10px;
  border: none;
  background: rgba(26,115,232,0.85);
  color: #fff; font: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background 0.15s, box-shadow 0.15s;
  box-shadow: 0 0 16px rgba(26,115,232,0.25);
}
.btn-primary:hover { background: #1A73E8; box-shadow: 0 0 22px rgba(26,115,232,0.40); }
.btn-primary:disabled { opacity: 0.5; cursor: default; }

/* ── Agenda ── */
.cal-day-group { margin-bottom: 22px; }
.cal-day-group:last-child { margin-bottom: 0; }

.cal-day-label {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.cal-day-label.today { color: #4285F4; }
.cal-day-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border-soft);
}

.cal-event-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px; border-radius: 14px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  margin-bottom: 8px;
  transition: background 0.15s, border-color 0.15s;
  position: relative;
}
.cal-event-row:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.10); }

.cal-event-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0; margin-top: 4px;
}
.cal-event-body { flex: 1; min-width: 0; }
.cal-event-time {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: var(--text-tertiary); letter-spacing: 0.04em;
  margin-bottom: 2px;
}
.cal-event-title {
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  line-height: 1.3; margin-bottom: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.cal-event-calname {
  font-size: 11px; color: var(--text-quaternary);
}

.cal-event-del {
  flex-shrink: 0; background: transparent;
  border: 1px solid transparent;
  color: var(--text-quaternary);
  cursor: pointer; font-size: 16px; line-height: 1;
  width: 28px; height: 28px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s, color 0.15s, border-color 0.15s, background 0.15s;
  font-family: inherit; padding: 0;
}
.cal-event-row:hover .cal-event-del { opacity: 1; }
.cal-event-del:hover {
  color: #FF6B6B; border-color: rgba(239,68,68,0.40);
  background: rgba(239,68,68,0.08);
}

/* Empty state */
.cal-empty {
  text-align: center; padding: 32px 16px;
  color: var(--text-tertiary); font-size: 14px; line-height: 1.6;
}

/* Loading state */
.cal-loading {
  display: flex; flex-direction: column; gap: 10px;
}
.cal-skel {
  height: 64px; border-radius: 14px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

::selection { background: rgba(26,115,232,0.25); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>
<main>

  <div class="dash-title-row">
    <h1 class="dash-title">Calendar</h1>
    <button class="refresh-btn" id="refreshBtn" title="Refresh" type="button">⟳</button>
  </div>

  <div id="lastUpdated" class="last-updated" style="display:none"></div>

  <!-- NOT CONNECTED -->
  <div id="notConnected" class="cal-card" style="display:none">
    <div class="not-connected-wrap">
      <div class="nc-brand-mark">G</div>
      <div class="nc-title">Connect Google Calendar</div>
      <div class="nc-sub">Sign in to see your upcoming events across all calendars, add new events, and stay on schedule.</div>
      <button class="nc-link" id="connectBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 18 18" style="flex-shrink:0" aria-hidden="true"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908C16.658 14.42 17.64 12.11 17.64 9.2z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- CALENDAR CONTENT -->
  <section id="calSection" style="display:none">

    <!-- Add event form -->
    <div class="section-title-row">
      <div class="section-title">Upcoming Events</div>
      <button class="cal-add-toggle" id="addEventToggle" type="button">＋ Add event</button>
    </div>

    <div id="addEventForm" class="cal-form-card" style="display:none">
      <div class="cal-form-title-row">
        <label class="form-label" for="evTitle">Event title</label>
        <input class="form-input" id="evTitle" type="text" placeholder="Meeting with team…" autocomplete="off">
      </div>
      <div class="cal-form-grid">
        <div>
          <label class="form-label" for="evDateTime">Date &amp; time</label>
          <input class="form-input" id="evDateTime" type="datetime-local">
        </div>
        <div>
          <label class="form-label" for="evCal">Calendar</label>
          <select class="form-input" id="evCal">
            <option value="">Loading…</option>
          </select>
        </div>
      </div>
      <div class="cal-form-actions">
        <button class="btn-ghost" id="addEventCancel" type="button">Cancel</button>
        <button class="btn-primary" id="addEventSubmit" type="button">Add Event</button>
      </div>
    </div>

    <!-- Agenda -->
    <div class="cal-card" style="padding: 24px">
      <div id="calAgenda">
        <div class="cal-loading">
          <div class="cal-skel"></div>
          <div class="cal-skel" style="height:52px"></div>
          <div class="cal-skel"></div>
        </div>
      </div>
    </div>

  </section>

</main>
<script>
(function () {
  'use strict';

  // ── OAuth constants ────────────────────────────────────────
  const CLIENT_ID     = '346851682856-fc9hou4644upor52m9ohjpvsuvlj3rjc.apps.googleusercontent.com';
  const ALL_SCOPES    = [
    'https://www.googleapis.com/auth/fitness.activity.read',
    'https://www.googleapis.com/auth/fitness.sleep.read',
    'https://www.googleapis.com/auth/fitness.heart_rate.read',
    'https://www.googleapis.com/auth/fitness.body.read',
    'https://www.googleapis.com/auth/calendar',
    'https://www.googleapis.com/auth/gmail.modify',
  ].join(' ');
  const TOKEN_KEY     = 'google_access_token';
  const REFRESH_KEY   = 'google_refresh_token';
  const TOKEN_EXP_KEY = 'google_token_exp';
  const CAL_BASE      = 'https://www.googleapis.com/calendar/v3';

  // Google Calendar colorId → hex
  const GCOLOR = {
    '1':'#7986cb','2':'#33b679','3':'#8e24aa','4':'#e67c73',
    '5':'#f6bf26','6':'#f4511e','7':'#039be5','8':'#616161',
    '9':'#3f51b5','10':'#0b8043','11':'#d50000',
  };

  // ── Token helpers ──────────────────────────────────────────
  function getToken() {
    const exp = parseInt(localStorage.getItem(TOKEN_EXP_KEY) || '0', 10);
    if (exp && Date.now() > exp) return null;
    return localStorage.getItem(TOKEN_KEY);
  }

  async function refreshAccessToken() {
    const rt = localStorage.getItem(REFRESH_KEY);
    if (!rt) return null;
    try {
      const r = await fetch('/api/google-refresh', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: rt }),
      });
      const d = await r.json();
      if (!d.access_token) return null;
      localStorage.setItem(TOKEN_KEY, d.access_token);
      localStorage.setItem(TOKEN_EXP_KEY, String(Date.now() + (d.expires_in || 3600) * 1000));
      return d.access_token;
    } catch { return null; }
  }

  // ── OAuth flow ─────────────────────────────────────────────
  function redirectUri() { return window.location.origin + '/calendar.html'; }

  function startLogin() {
    const state = typeof crypto !== 'undefined' && crypto.randomUUID
      ? crypto.randomUUID() : Math.random().toString(36).slice(2, 18);
    sessionStorage.setItem('oauth_state', state);
    window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + new URLSearchParams({
      client_id: CLIENT_ID, redirect_uri: redirectUri(),
      response_type: 'code', scope: ALL_SCOPES,
      access_type: 'offline', prompt: 'consent', state,
    });
  }

  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    if (!code) return false;
    const state = params.get('state');
    const saved = sessionStorage.getItem('oauth_state');
    sessionStorage.removeItem('oauth_state');
    if (state !== saved) { history.replaceState(null, '', window.location.pathname); return false; }
    try {
      const r = await fetch('/api/google-token', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, redirect_uri: redirectUri() }),
      });
      const d = await r.json();
      if (!d.access_token) return false;
      localStorage.setItem(TOKEN_KEY, d.access_token);
      localStorage.setItem(TOKEN_EXP_KEY, String(Date.now() + (d.expires_in || 3600) * 1000));
      if (d.refresh_token) localStorage.setItem(REFRESH_KEY, d.refresh_token);
      history.replaceState(null, '', window.location.pathname);
      return true;
    } catch { return false; }
  }

  // ── API fetch ──────────────────────────────────────────────
  async function gFetch(url, opts = {}) {
    let tok = getToken();
    if (!tok) { tok = await refreshAccessToken(); if (!tok) throw new Error('not_authed'); }
    const doFetch = t => {
      const fo = { method: opts.method || 'GET', headers: { Authorization: 'Bearer ' + t, Accept: 'application/json' } };
      if (opts.body) { fo.headers['Content-Type'] = 'application/json'; fo.body = JSON.stringify(opts.body); }
      return fetch(url, fo);
    };
    let r = await doFetch(tok);
    if (r.status === 401) {
      tok = await refreshAccessToken();
      if (!tok) throw new Error('token_expired');
      r = await doFetch(tok);
    }
    if (r.status === 403) {
      localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(REFRESH_KEY); localStorage.removeItem(TOKEN_EXP_KEY);
      throw new Error('scope_error');
    }
    if (r.status === 204 || r.status === 200 && r.headers.get('content-length') === '0') return {};
    if (!r.ok) throw new Error('api_' + r.status);
    return r.json();
  }

  // ── Calendar data ──────────────────────────────────────────
  let calendarMap = {};

  async function loadCalendars() {
    const data = await gFetch(CAL_BASE + '/calendarList');
    calendarMap = {};
    for (const cal of (data.items || [])) {
      const color = cal.backgroundColor || GCOLOR[cal.colorId] || '#1A73E8';
      calendarMap[cal.id] = { name: cal.summary, color, primary: cal.primary };
    }
    return Object.keys(calendarMap);
  }

  async function loadEvents() {
    const calIds = await loadCalendars();
    const now = new Date();
    const end = new Date(now); end.setDate(end.getDate() + 14);
    const params = new URLSearchParams({
      timeMin: now.toISOString(), timeMax: end.toISOString(),
      singleEvents: 'true', orderBy: 'startTime', maxResults: '100',
    });
    const results = await Promise.allSettled(
      calIds.map(id => gFetch(`${CAL_BASE}/calendars/${encodeURIComponent(id)}/events?${params}`))
    );
    const events = [];
    results.forEach((r, i) => {
      if (r.status === 'fulfilled' && r.value.items) {
        r.value.items.forEach(ev => { ev._calId = calIds[i]; events.push(ev); });
      }
    });
    events.sort((a, b) => {
      const ts = e => new Date(e.start.dateTime || (e.start.date + 'T00:00:00'));
      return ts(a) - ts(b);
    });
    return events;
  }

  // ── Formatting ─────────────────────────────────────────────
  function dayKey(ev) {
    return ev.start.date || ev.start.dateTime.split('T')[0];
  }

  function dayLabel(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    const today    = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
    if (date.getTime() === today.getTime()) return { label: 'Today', isToday: true };
    if (date.getTime() === tomorrow.getTime()) return { label: 'Tomorrow', isToday: false };
    return { label: date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }), isToday: false };
  }

  function eventTime(ev) {
    if (ev.start.date) return 'All day';
    return new Date(ev.start.dateTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Render ─────────────────────────────────────────────────
  function renderAgenda(events) {
    const container = document.getElementById('calAgenda');
    if (!events.length) {
      container.innerHTML = '<div class="cal-empty">No events in the next 14 days.<br>Tap <strong>＋ Add event</strong> to get started.</div>';
      return;
    }
    const groups = {};
    const order  = [];
    for (const ev of events) {
      const k = dayKey(ev);
      if (!groups[k]) { groups[k] = []; order.push(k); }
      groups[k].push(ev);
    }
    let html = '';
    for (const dateStr of order) {
      const { label, isToday } = dayLabel(dateStr);
      html += `<div class="cal-day-group"><div class="cal-day-label${isToday ? ' today' : ''}">${esc(label)}</div>`;
      for (const ev of groups[dateStr]) {
        const cal = calendarMap[ev._calId] || { name: 'Calendar', color: '#1A73E8' };
        html += `<div class="cal-event-row">
          <span class="cal-event-dot" style="background:${cal.color}"></span>
          <div class="cal-event-body">
            <div class="cal-event-time">${esc(eventTime(ev))}</div>
            <div class="cal-event-title">${esc(ev.summary || '(No title)')}</div>
            <div class="cal-event-calname">${esc(cal.name)}</div>
          </div>
          <button class="cal-event-del"
            data-evid="${esc(ev.id)}"
            data-calid="${esc(ev._calId)}"
            title="Delete event" type="button">×</button>
        </div>`;
      }
      html += '</div>';
    }
    container.innerHTML = html;

    container.querySelectorAll('.cal-event-del').forEach(btn => {
      btn.addEventListener('click', async () => {
        const evid  = btn.dataset.evid;
        const calid = btn.dataset.calid;
        if (!confirm('Delete this event from your calendar?')) return;
        btn.disabled = true;
        try {
          await gFetch(`${CAL_BASE}/calendars/${encodeURIComponent(calid)}/events/${encodeURIComponent(evid)}`, { method: 'DELETE' });
          const row = btn.closest('.cal-event-row');
          row.style.transition = 'opacity 0.2s, transform 0.2s';
          row.style.opacity = '0'; row.style.transform = 'translateX(12px)';
          setTimeout(() => { row.remove(); cleanupEmptyGroups(); }, 220);
        } catch (e) { btn.disabled = false; console.error('Delete failed:', e); }
      });
    });
  }

  function cleanupEmptyGroups() {
    document.querySelectorAll('.cal-day-group').forEach(g => {
      if (!g.querySelector('.cal-event-row')) g.remove();
    });
    const agenda = document.getElementById('calAgenda');
    if (!agenda.querySelector('.cal-event-row')) {
      agenda.innerHTML = '<div class="cal-empty">No events in the next 14 days.</div>';
    }
  }

  // ── UI helpers ─────────────────────────────────────────────
  function showNotConnected() {
    document.getElementById('notConnected').style.display = '';
    document.getElementById('calSection').style.display   = 'none';
  }
  function showConnected() {
    document.getElementById('notConnected').style.display = 'none';
    document.getElementById('calSection').style.display   = '';
  }

  function markUpdated() {
    const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const el = document.getElementById('lastUpdated');
    if (el) { el.textContent = 'Last updated ' + t; el.style.display = ''; }
  }

  function populateCalSelect() {
    const sel = document.getElementById('evCal');
    sel.innerHTML = '<option value="">Select calendar…</option>';
    for (const [id, cal] of Object.entries(calendarMap)) {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = cal.name;
      if (cal.primary) opt.selected = true;
      sel.appendChild(opt);
    }
  }

  function setDefaultDateTime() {
    const inp = document.getElementById('evDateTime');
    if (inp.value) return;
    const now = new Date();
    now.setMinutes(Math.ceil(now.getMinutes() / 15) * 15, 0, 0);
    const pad = n => String(n).padStart(2, '0');
    inp.value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  }

  // ── Load + refresh ─────────────────────────────────────────
  async function refreshData() {
    const rb = document.getElementById('refreshBtn');
    if (rb) rb.classList.add('spinning');
    try {
      const events = await loadEvents();
      renderAgenda(events);
      populateCalSelect();
      markUpdated();
    } catch (e) {
      if (['not_authed','token_expired','scope_error'].includes(e.message)) showNotConnected();
      else console.error('Calendar load error:', e);
    } finally {
      if (rb) rb.classList.remove('spinning');
    }
  }

  // ── Init ───────────────────────────────────────────────────
  async function init() {
    await handleCallback();
    let tok = getToken();
    if (!tok) tok = await refreshAccessToken();
    if (!tok) {
      showNotConnected();
      document.getElementById('connectBtn').addEventListener('click', startLogin);
      return;
    }

    showConnected();

    // Refresh button
    document.getElementById('refreshBtn').addEventListener('click', refreshData);

    // Toggle add form
    const toggle = document.getElementById('addEventToggle');
    const form   = document.getElementById('addEventForm');
    toggle.addEventListener('click', () => {
      const open = form.style.display !== 'none';
      form.style.display = open ? 'none' : '';
      toggle.classList.toggle('active', !open);
      toggle.textContent = open ? '＋ Add event' : '✕ Cancel';
      if (!open) { setDefaultDateTime(); populateCalSelect(); }
    });

    document.getElementById('addEventCancel').addEventListener('click', () => {
      form.style.display = 'none';
      toggle.classList.remove('active');
      toggle.textContent = '＋ Add event';
    });

    document.getElementById('addEventSubmit').addEventListener('click', async () => {
      const title = document.getElementById('evTitle').value.trim();
      const dtVal = document.getElementById('evDateTime').value;
      const calId = document.getElementById('evCal').value;
      if (!title || !dtVal || !calId) {
        document.getElementById('evTitle').focus();
        return;
      }
      const submitBtn = document.getElementById('addEventSubmit');
      submitBtn.disabled = true; submitBtn.textContent = 'Adding…';
      try {
        const start = new Date(dtVal);
        const end   = new Date(start.getTime() + 60 * 60 * 1000);
        const tz    = Intl.DateTimeFormat().resolvedOptions().timeZone;
        await gFetch(`${CAL_BASE}/calendars/${encodeURIComponent(calId)}/events`, {
          method: 'POST',
          body: {
            summary: title,
            start: { dateTime: start.toISOString(), timeZone: tz },
            end:   { dateTime: end.toISOString(),   timeZone: tz },
          },
        });
        document.getElementById('evTitle').value = '';
        form.style.display = 'none';
        toggle.classList.remove('active');
        toggle.textContent = '＋ Add event';
        await refreshData();
      } catch (e) {
        console.error('Create event failed:', e);
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = 'Add Event';
      }
    });

    // Enter key submits title
    document.getElementById('evTitle').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('addEventSubmit').click();
    });

    await refreshData();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => init(), { once: true });
  } else {
    init();
  }
})();
</script>
</body>
</html>
